version: '3.9'

services:
  mongo:
    image: mongo:7.0
    container_name: bhagwati-mongo
    restart: unless-stopped

    environment:
      MONGO_INITDB_DATABASE: bhagwatiElec

    volumes:
      - mongo_data:/data/db

    networks:
      - bhagwati-network

  backend:
    build: .

    container_name: bhagwati-backend

    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      MONGODB_URI: mongodb://mongo:27017/bhagwatiElec

    depends_on:
      - mongo

    networks:
      - bhagwati-network

volumes:
  mongo_data:

networks:
  bhagwati-network: