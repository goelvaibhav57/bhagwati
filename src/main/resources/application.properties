#spring.data.mongodb.database=bhagwatiElec
#spring.data.mongodb.port=27017
#spring.data.mongodb.host=localhost
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=40MB
spring.data.mongodb.auto-index-creation=false
#spring.data.mongodb.uri= mongodb://localhost:27017/bhagwatiElec
spring.data.mongodb.uri= mongodb://myuser:mypassword@my-mongo-mongodb.default.svc.cluster.local:27017/bhagwatiElec?authSource=bhagwatiElec
server.port=8080
server.address=0.0.0.0
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always